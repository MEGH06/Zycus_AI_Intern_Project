name: Eval & Tests

on:
  push:
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Health check
        run: python -m src.cli health

      - name: Run tests
        run: pytest -q

      - name: Run eval harness (fixture mode — no API keys required)
        run: python -m src.cli eval --use-fixtures

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            evals/eval_report.md
            evals/eval_report.json
